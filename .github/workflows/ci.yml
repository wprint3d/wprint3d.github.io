name: CI

on: [push, pull_request]

env:
  FORCE_COLOR: 2

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  build:
    runs-on: ubuntu-22.04
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3
      -
        name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      -
        name: Install PNPM
        run: npm install -g pnpm
      -
        name: Install Yarn
        run: npm install -g yarn
      -
        name: Install dependencies
        run: pnpm install
      -
        name: Print plugin flag value for export
        env:
          EXPO_PUBLIC_PLUGIN_SYSTEM_ENABLED: ${{ vars.EXPO_PUBLIC_PLUGIN_SYSTEM_ENABLED }}
        run: echo "EXPO_PUBLIC_PLUGIN_SYSTEM_ENABLED=${EXPO_PUBLIC_PLUGIN_SYSTEM_ENABLED:-<unset>}"
      -
        name: Compile the bundle
        env:
          EXPO_PUBLIC_PLUGIN_SYSTEM_ENABLED: ${{ vars.EXPO_PUBLIC_PLUGIN_SYSTEM_ENABLED }}
        run: pnpm exec expo export --platform web
      -
        name: Verify plugin flag was inlined into the web bundle
        run: |
          if rg -n 'process\.env\.EXPO_PUBLIC_PLUGIN_SYSTEM_ENABLED|process\.env\["EXPO_PUBLIC_PLUGIN_SYSTEM_ENABLED"\]|process\.env\[\"EXPO_PUBLIC_PLUGIN_SYSTEM_ENABLED\"\]' dist/_expo/static/js/web; then
            echo "The plugin feature flag was not inlined into the exported web bundle."
            exit 1
          fi
      -
        name: Copy extra assets to the dist folder
        run: cp -fv ./install ./dist
      -
        name: Disable Jekyll
        run: touch ./dist/.nojekyll
      -
        name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
